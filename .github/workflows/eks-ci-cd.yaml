name: EKS CI/CD

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  AWS_REGION: us-east-1
  CLUSTER_NAME: dotnet-microservices

jobs:

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [finance, school, inventory, vivahadeepam]

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Image Tag
      id: vars
      run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Image
      run: |
        docker build -t $DOCKERHUB_USERNAME/${{ matrix.service }}:${{ steps.vars.outputs.tag }} ./apps/${{ matrix.service }}
        docker tag $DOCKERHUB_USERNAME/${{ matrix.service }}:${{ steps.vars.outputs.tag }} $DOCKERHUB_USERNAME/${{ matrix.service }}:latest

    - name: Push Image
      run: |
        docker push $DOCKERHUB_USERNAME/${{ matrix.service }}:${{ steps.vars.outputs.tag }}
        docker push $DOCKERHUB_USERNAME/${{ matrix.service }}:latest

  deploy:

    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [finance, school, inventory, vivahadeepam]

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $CLUSTER_NAME

# -----------------------------
# Base Kubernetes Resources
# -----------------------------

    - name: Create Namespace
      run: |
        kubectl apply -f kubernetes/namespace.yaml

    - name: Create MSSQL Secret
      run: |
        kubectl create secret generic mssql-secret \
          --from-literal=SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }} \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Finance DB Secret
      run: |
        kubectl create secret generic financedb-secret \
          --from-literal=connectionstring="Server=mssql;Database=financedb;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True" \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Inventory DB Secret
      run: |
        kubectl create secret generic inventorydb-secret \
          --from-literal=connectionstring="Server=mssql;Database=inventorydb;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True" \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create School DB Secret
      run: |
        kubectl create secret generic schooldb-secret \
          --from-literal=connectionstring="Server=mssql;Database=schooldb;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True" \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Vivahadeepam DB Secret
      run: |
        kubectl create secret generic vivahadeepamdb-secret \
          --from-literal=connectionstring="Server=mssql;Database=vivahadeepamdb;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True" \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Create AWS S3 Secret
      run: |
        kubectl create secret generic aws-s3-secret \
          --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -n dotnet-microservices \
          --dry-run=client -o yaml | kubectl apply -f -

# -----------------------------
# Deploy Application
# -----------------------------

    - name: Deploy Storage
      run: |
        kubectl apply -f kubernetes/storage/

    - name: Deploy Database
      run: |
        kubectl apply -f kubernetes/database/

    - name: Deploy Microservices
      run: |
        kubectl apply -R -f kubernetes/

    - name: Update Deployments with New Image
      run: |
        kubectl set image deployment/${{ matrix.service }} \
        ${{ matrix.service }}=$DOCKERHUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG \
        -n dotnet-microservices

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/${{ matrix.service }} -n dotnet-microservices

    - name: Verify Deployment
      run: |
        kubectl get pods -n dotnet-microservices
        kubectl get svc -n dotnet-microservices
        kubectl get ingress -n dotnet-microservices

