apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance
  namespace: dotnet-microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance
  template:
    metadata:
      labels:
        app: finance
    spec:
      containers:
      - name: finance
        image: josephmj0303/finance:latest
        ports:
        - containerPort: 5004
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5004"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: financedb-secret
              key: connectionstring
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
