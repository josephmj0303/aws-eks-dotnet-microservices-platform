apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dotnet-ingress
  namespace: dotnet-microservices
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:

  - host: finance.joedevopslab.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finance
            port:
              number: 80

  - host: school.joedevopslab.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: school
            port:
              number: 80

  - host: inventory.joedevopslab.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: inventory
            port:
              number: 80

  - host: vivahadeepam.joedevopslab.xyz
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vivahadeepam
            port:
              number: 80
