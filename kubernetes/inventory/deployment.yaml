apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: dotnet-microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory
        image: josephmj0303/inventory:latest
        ports:
        - containerPort: 5002
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5002"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: inventorydb-secret
              key: connectionstring
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /health/ready
            port: 5002
          failureThreshold: 30
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
          successThreshold: 1

        livenessProbe:
          httpGet:
            path: /health/live
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

