apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mssql
  namespace: dotnet-microservices
spec:
  serviceName: mssql
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
        - containerPort: 1433
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          value: "TempPass123!"
        volumeMounts:
        - name: mssql-data
          mountPath: /var/opt/mssql
        - name: backup-volume
          mountPath: /var/opt/mssql/backup
        - name: restore-script
          mountPath: /var/opt/mssql/restore.sql
          subPath: restore.sql

      volumes:
      - name: backup-volume
        hostPath:
          path: /data/mssql-backups

      - name: restore-script
        configMap:
          name: mssql-restore-script

  volumeClaimTemplates:
  - metadata:
      name: mssql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
